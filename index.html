<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h2 class="title">Board de Tarefas</h2>
        <div class="input-wrapper">
            <input id="nome" type="text" placeholder="Nome da Tarefa" />
            <input id="etiqueta" type="text" placeholder="Etiqueta" />
            <button class="adicionar">
                +
            </button>
        </div>

        <div class="container-tarefas">
            <div class="conteudo-tarefa">
                <h3 class="titulo-tarefa">Implementar tela de listagem</h3>
                <div class="conteudo">
                    <p class="frontend">frontend</p>
                    <p class="date">21/08/2024</p>
                    <button class="concluir">Concluir</button>
                    <img id="checked" />
                </div>
            </div>
        </div>

        <div class="container-tarefas">
            <div class="conteudo-tarefa">
                <h3 class="titulo-tarefa">Criar endpoint de tarefa</h3>
                <div class="conteudo">
                    <p class="frontend">backend</p>
                    <p class="date">21/08/2024</p>
                    <button class="concluir">Concluir</button>
                    <img id="checked"  /> 
                </div>
            </div>
        </div>

        <div class="container-tarefas">
            <div class="conteudo-tarefa">
                <h3 class="underline">Implementar tela de listagem</h3>
                <div class="conteudo">
                    <p class="frontend">UX</p>
                    <p class="date">21/08/2024</p>
                    <img class="checked-img" src="./assets/Checked.png" alt="checked" />
                </div>
            </div>
        </div>
       <div class="text-footer">
        <p class="qtd-tarefas">1 Tarefa concluida</p>
       </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
